services:

  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - static_data:/app/static
      - logs_data:/app/logs
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout:  10s
      retries:  3

  celery:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    command: >
      celery -A backend worker
      --loglevel=info
      --concurrency=2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - logs_data:/app/logs
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    command: >
      celery -A backend beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - logs_data:/app/logs
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: always
    depends_on:
      web:
        condition: service_healthy
    env_file: .env
    environment:
      API_BASE_URL: http://web:8000

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/static:ro
      - media_data:/app/media:ro
      - certbot_data:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_data:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
  logs_data:
  certbot_data:
  certbot_certs:
