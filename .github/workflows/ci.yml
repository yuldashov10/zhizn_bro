name: CI

on:
  push:
    branches: [dev, feature/**]
  pull_request:
    branches: [dev, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==2.3.3

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run isort
        run: poetry run isort bot backend tests --check-only

      - name: Run black
        run: poetry run black bot backend tests --check

      - name: Run flake8
        run: poetry run flake8 bot backend tests

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       test_db
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY:             ${{ secrets.SECRET_KEY }}
      DEBUG:                  "True"
      ALLOWED_HOSTS:          localhost,127.0.0.1
      DB_ENGINE:              django.db.backends.postgresql
      DB_NAME:                test_db
      DB_USER:                test_user
      DB_PASSWORD:            test_password
      DB_HOST:                localhost
      DB_PORT:                5432
      REDIS_URL:              redis://localhost:6379/0
      BOT_TOKEN:              ${{ secrets.BOT_TOKEN }}
      ADMIN_TELEGRAM_ID:      ${{ secrets.ADMIN_TELEGRAM_ID }}
      AI_PROVIDER:            groq
      GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
      SENTRY_DSN:             ""
      REPORT_RETENTION_DAYS:  "30"
      DJANGO_SETTINGS_MODULE: backend.settings

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core

      - name: Install Poetry
        run: pip install poetry==2.3.3

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Create required directories
        run: mkdir -p logs backend/media backend/static

      - name: Run migrations
        working-directory: backend
        run: poetry run python manage.py migrate

      - name: Run tests
        run: |
          poetry run pytest tests/ -v \
            --cov=apps \
            --cov=api \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  auto-merge:
    name: Auto merge dev → main
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/dev'

    steps:
      - uses: actions/checkout@v4
        with:
          token:       ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

      - name: Merge dev into main
        run: |
          git fetch origin
          git checkout main
          git merge origin/dev --ff-only
          git push origin main

      - name: Notify success
        uses: appleboy/telegram-action@master
        with:
          to:      ${{ secrets.ADMIN_TELEGRAM_ID }}
          token:   ${{ secrets.BOT_TOKEN }}
          message: |
            ✅ dev → main слияние успешно!
            Коммит: ${{ github.sha }}
            Автор: ${{ github.actor }}
