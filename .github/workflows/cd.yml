name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/web
            ghcr.io/${{ github.repository }}/bot
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       backend/Dockerfile
          push:       true
          tags:       ghcr.io/${{ github.repository }}/web:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push bot image
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       bot/Dockerfile
          push:       true
          tags:       ghcr.io/${{ github.repository }}/bot:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/zhizn_bro

            # Подтягиваем последние образы
            docker-compose pull

            # Перезапускаем сервисы
            docker-compose up -d --build

            # Применяем миграции
            docker-compose exec -T web python manage.py migrate

            # Собираем статику
            docker-compose exec -T web python manage.py collectstatic --noinput

            # Настраиваем периодические задачи
            docker-compose exec -T web python manage.py setup_periodic_tasks

            # Удаляем старые образы
            docker image prune -f

            echo "✅ Деплой завершён: $(date)"

      - name: Notify on success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to:      ${{ secrets.ADMIN_TELEGRAM_ID }}
          token:   ${{ secrets.BOT_TOKEN }}
          message: |
            ✅ Деплой успешен!
            Ветка: ${{ github.ref_name }}
            Коммит: ${{ github.sha }}
            Автор: ${{ github.actor }}

      - name: Notify on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to:      ${{ secrets.ADMIN_TELEGRAM_ID }}
          token:   ${{ secrets.BOT_TOKEN }}
          message: |
            ❌ Деплой провалился!
            Ветка: ${{ github.ref_name }}
            Коммит: ${{ github.sha }}
            Проверь: ${{ github.server_url }}/${{ github.repository }}/actions
